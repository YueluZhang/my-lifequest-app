<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LifeQuest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF9F2;
    --panel: #FFFFFF;
    --border: #F0DCC8;
    --ink: #6B5344;
    --pink: #FFD3DE;
    --pink-d: #F98CA8;
    --mint: #C9F0E0;
    --mint-d: #4FBE95;
    --lav: #E3D8F7;
    --lav-d: #A98DE0;
    --capy: #D9B382;
    --capy-d: #B98F5C;
    --gold-a: #F3C05B;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Quicksand', sans-serif;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .cute { font-family: 'Baloo 2', sans-serif; }
  #app { max-width: 620px; margin: 0 auto; position: relative; }

  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
    position: relative;
  }
  h1.cute { font-size: 26px; font-weight: 700; color: var(--pink-d); margin: 0; }
  .mascot-wrap {
    flex: 0 0 auto;
    width: 72px;
    height: 72px;
    transition: transform 0.25s ease;
  }
  .mascot-wrap.shake { animation: shake 0.6s ease; }
  .mascot-wrap.bounce { animation: bounce 0.7s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0) rotate(0); }
    20% { transform: translateX(-4px) rotate(-4deg); }
    40% { transform: translateX(4px) rotate(4deg); }
    60% { transform: translateX(-3px) rotate(-3deg); }
    80% { transform: translateX(3px) rotate(2deg); }
  }
  @keyframes bounce {
    0%,100% { transform: scale(1); }
    30% { transform: scale(1.25) rotate(-6deg); }
    60% { transform: scale(0.95) rotate(4deg); }
  }
  .speech {
    font-size: 12px; color: var(--capy-d); background: var(--mint);
    border-radius: 12px; padding: 4px 10px; margin-left: 4px; display: inline-block;
    transition: background 0.3s;
  }
  .tear { opacity: 0; }
  .crying .tear { animation: teardrop 1.1s ease-in; }
  @keyframes teardrop {
    0% { opacity: 0; transform: translateY(0); }
    15% { opacity: 1; }
    100% { opacity: 0; transform: translateY(14px); }
  }

  #confetti-layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 0;
    overflow: visible; pointer-events: none; z-index: 5;
  }
  .confetti-piece {
    position: absolute; top: -10px; width: 8px; height: 8px; border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(160px) rotate(360deg); opacity: 0; }
  }
  .level-badge {
    font-size: 11px; font-weight: 700; color: var(--capy-d);
    background: var(--gold-a); border-radius: 8px; padding: 2px 8px;
    margin-left: 6px;
  }

  .stats { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .stat-row { display: flex; align-items: center; gap: 10px; }
  .stat-label { width: 48px; font-size: 12px; font-weight: 700; opacity: 0.75; }
  .bar-track { flex: 1; height: 14px; background: #F5EBDD; border-radius: 999px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
  .bar-fill.hp { background: var(--pink-d); }
  .bar-fill.gold { background: var(--gold-a); }
  .bar-fill.xp { background: var(--mint-d); }
  .stat-num { width: 60px; text-align: right; font-size: 12px; font-weight: 700; }

  .quest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .quest-btn {
    background: var(--panel); border: 2px solid var(--border); border-radius: 18px;
    color: var(--ink); font-family: 'Quicksand', sans-serif; font-weight: 700;
    padding: 16px 14px; cursor: pointer; text-align: left;
    box-shadow: 0 3px 0 var(--border); transition: transform 0.12s, box-shadow 0.12s;
  }
  .quest-btn:hover { transform: translateY(-2px); }
  .quest-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--border); }
  .quest-btn .tag { display: block; font-size: 10px; font-weight: 600; opacity: 0.55; margin-bottom: 6px; letter-spacing: 0.5px; }
  .quest-btn .title { font-size: 14px; }
  .quest-btn.job { border-color: var(--pink); }
  .quest-btn.gold { border-color: var(--gold-a); }
  .quest-btn.time { border-color: var(--lav); }
  .quest-btn.board { border-color: var(--mint); }

  #mini-form {
    display: none; background: var(--panel); border: 2px solid var(--lav);
    border-radius: 18px; padding: 16px; margin-bottom: 20px;
  }
  #mini-form label { display: block; font-size: 12px; font-weight: 600; opacity: 0.75; margin: 8px 0 4px; }
  #mini-form input, #mini-form textarea {
    width: 100%; background: var(--cream); border: 2px solid var(--border); border-radius: 10px;
    color: var(--ink); font-family: 'Quicksand', sans-serif; padding: 8px 10px; font-size: 13px;
  }
  #mini-form textarea { min-height: 60px; resize: vertical; }
  .form-actions { display: flex; gap: 8px; margin-top: 12px; }
  .form-actions button { flex: 1; padding: 10px; border: none; border-radius: 10px; font-family: 'Quicksand', sans-serif; font-weight: 700; cursor: pointer; }
  .form-actions button.submit { background: var(--mint-d); color: white; }
  .form-actions button.cancel { background: #F5EBDD; color: var(--ink); }

  .log-box { background: var(--panel); border: 2px solid var(--border); border-radius: 20px; padding: 6px; }
  .log-inner { max-height: 320px; overflow-y: auto; padding: 12px; font-size: 13px; line-height: 1.6; }
  .log-entry { margin-bottom: 12px; display: flex; gap: 10px; align-items: flex-start; }
  .badge { flex: 0 0 auto; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .badge.job { background: var(--pink); }
  .badge.gold { background: #FCE3AC; }
  .badge.time { background: var(--lav); }
  .badge.you { background: var(--mint); }
  .log-bubble { background: var(--cream); border-radius: 14px; padding: 8px 12px; flex: 1; opacity: 0; animation: fadeIn 0.3s forwards; }
  @keyframes fadeIn { to { opacity: 1; } }
  .log-empty { opacity: 0.5; font-size: 12px; padding: 8px; }
  .loading { font-size: 12px; opacity: 0.55; padding: 4px 12px; }

  #ears {
    transform-origin: 50px 58px;
  }
  #ears.bounce {
    animation: ears-bounce-anim 0.4s ease-out;
  }
  @keyframes ears-bounce-anim {
    0%, 100% { transform: translateY(0) scaleY(1); }
    40% { transform: translateY(-5px) scaleY(1.2); }
    70% { transform: translateY(1px) scaleY(0.95); }
  }
</style>
</head>
<body>
<div id="app">
  <div id="confetti-layer"></div>
  <div class="header">
    <div class="mascot-wrap" id="mascot-wrap">
      <svg viewBox="0 0 100 100" width="72" height="72" id="mascot">
        <ellipse cx="50" cy="58" rx="38" ry="32" fill="var(--capy)"/>
        <g id="ears">
          <circle cx="20" cy="30" r="11" fill="var(--capy)"/>
          <circle cx="80" cy="30" r="11" fill="var(--capy)"/>
          <circle cx="20" cy="31" r="5" fill="var(--capy-d)"/>
          <circle cx="80" cy="31" r="5" fill="var(--capy-d)"/>
        </g>
        <ellipse cx="30" cy="66" rx="7" ry="5" fill="#FFC9D6" opacity="0.7"/>
        <ellipse cx="70" cy="66" rx="7" ry="5" fill="#FFC9D6" opacity="0.7"/>
        <ellipse cx="50" cy="70" rx="10" ry="7" fill="#C99A66"/>

        <!-- eye sockets with mouse-tracking pupils -->
        <ellipse cx="37" cy="50" rx="8" ry="9" fill="white"/>
        <ellipse cx="63" cy="50" rx="8" ry="9" fill="white"/>
        <circle id="pupil-l" cx="37" cy="50" r="3.4" fill="#5C4530"/>
        <circle id="pupil-r" cx="63" cy="50" r="3.4" fill="#5C4530"/>

        <!-- eyebrows / lids, one group shown per mood -->
        <g id="brow-happy"></g>
        <g id="brow-sleepy" style="display:none">
          <path d="M30 44 Q37 40 44 44" stroke="var(--capy-d)" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M56 44 Q63 40 70 44" stroke="var(--capy-d)" stroke-width="3" fill="none" stroke-linecap="round"/>
        </g>
        <g id="brow-worried">
          <path d="M30 41 L44 45" stroke="#5C4530" stroke-width="2.5" stroke-linecap="round" style="display:none" id="brow-w-l"/>
          <path d="M70 41 L56 45" stroke="#5C4530" stroke-width="2.5" stroke-linecap="round" style="display:none" id="brow-w-r"/>
        </g>

        <!-- mouth, one path shown per mood -->
        <path id="mouth-happy" d="M42 72 Q50 78 58 72" stroke="#5C4530" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path id="mouth-sleepy" d="M45 74 Q50 76 55 74" stroke="#5C4530" stroke-width="2.5" fill="none" stroke-linecap="round" style="display:none"/>
        <path id="mouth-worried" d="M42 76 Q50 70 58 76" stroke="#5C4530" stroke-width="2.5" fill="none" stroke-linecap="round" style="display:none"/>

        <!-- tears, animated on HP loss -->
        <g id="tears">
          <ellipse class="tear" cx="34" cy="60" rx="2.2" ry="3.4" fill="#8FD3F4"/>
          <ellipse class="tear" cx="66" cy="60" rx="2.2" ry="3.4" fill="#8FD3F4"/>
        </g>

        <!-- growth accessories, unlocked by level -->
        <g id="acc-bow" style="display:none">
          <path d="M14 20 L22 26 L14 32 Z" fill="var(--pink-d)"/>
          <path d="M26 20 L18 26 L26 32 Z" fill="var(--pink-d)"/>
          <circle cx="20" cy="26" r="3" fill="#E86B8A"/>
        </g>
        <g id="acc-crown" style="display:none">
          <path d="M38 16 L44 26 L50 14 L56 26 L62 16 L62 26 L38 26 Z" fill="var(--gold-a)" stroke="#C98F2E" stroke-width="1"/>
        </g>
      </svg>
    </div>
    <div>
      <h1 class="cute">LifeQuest <span class="level-badge" id="level-badge">Lv.1</span></h1>
      <span class="speech" id="mascot-line">Let's get after it today!</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat-row">
      <span class="stat-label">HP</span>
      <div class="bar-track"><div class="bar-fill hp" id="hp-fill" style="width:70%"></div></div>
      <span class="stat-num" id="hp-num">70/100</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">GOLD</span>
      <div class="bar-track"><div class="bar-fill gold" id="gold-fill" style="width:40%"></div></div>
      <span class="stat-num" id="gold-num">--</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">XP</span>
      <div class="bar-track"><div class="bar-fill xp" id="xp-fill" style="width:15%"></div></div>
      <span class="stat-num" id="xp-num">--</span>
    </div>
  </div>

  <div class="quest-grid">
    <button class="quest-btn job" onclick="openForm('job')">
      <span class="tag">JOB BOSS</span>
      <span class="title">Log a job / interview</span>
    </button>
    <button class="quest-btn gold" onclick="openForm('gold')">
      <span class="tag">GOLD KEEPER</span>
      <span class="title">Log income / expense</span>
    </button>
    <button class="quest-btn time" onclick="openForm('time')">
      <span class="tag">TIME GUARDIAN</span>
      <span class="title">Add a deadline</span>
    </button>
    <button class="quest-btn board" onclick="checkBoard()">
      <span class="tag">QUEST MASTER</span>
      <span class="title">Check today's quest board</span>
    </button>
  </div>

  <div id="mini-form"></div>

  <div class="log-box">
    <div class="log-inner" id="log">
      <div class="log-empty">Tap a button above to start today's quest~</div>
    </div>
  </div>
</div>

<script>
// ====== Config: point this at wherever your ADK backend is running ======
// - "agents-cli playground" (agy) defaults to port 8080
// - plain "adk web" / "adk api_server" defaults to port 8000
// Change this to match whichever one you're actually running.
const API_BASE = "http://127.0.0.1:8000";
const APP_NAME = "app";           // must match your agent folder name
const USER_ID = "player1";
const SESSION_ID = "session1";

let prevHp = null;
let prevLevel = null;

const moodLines = {
  happy: ["Let's get after it today!", "Feeling great!", "Onward!"],
  sleepy: ["Getting a little tired, drink some water", "Maybe take a short break?"],
  worried: ["The capybara is a bit worried...", "Maybe handle the urgent stuff first"]
};

/* ---------- pupils follow the mouse ---------- */
document.addEventListener("mousemove", (e) => {
  const svg = document.getElementById("mascot");
  const rect = svg.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  const angle = Math.atan2(dy, dx);
  const dist = Math.min(2.6, Math.hypot(dx, dy) / 40);
  const ox = Math.cos(angle) * dist;
  const oy = Math.sin(angle) * dist;
  document.getElementById("pupil-l").setAttribute("transform", `translate(${ox},${oy})`);
  document.getElementById("pupil-r").setAttribute("transform", `translate(${ox},${oy})`);
});

/* ---------- mood (eyebrows + mouth) ---------- */
function setMood(mood) {
  document.getElementById("brow-sleepy").style.display = mood === "sleepy" ? "block" : "none";
  document.getElementById("brow-w-l").style.display = mood === "worried" ? "block" : "none";
  document.getElementById("brow-w-r").style.display = mood === "worried" ? "block" : "none";
  document.getElementById("mouth-happy").style.display = mood === "happy" ? "block" : "none";
  document.getElementById("mouth-sleepy").style.display = mood === "sleepy" ? "block" : "none";
  document.getElementById("mouth-worried").style.display = mood === "worried" ? "block" : "none";
  const lines = moodLines[mood];
  document.getElementById("mascot-line").textContent = lines[Math.floor(Math.random() * lines.length)];
}

/* ---------- sad effect when HP drops ---------- */
function triggerSad() {
  const wrap = document.getElementById("mascot-wrap");
  const tears = document.getElementById("tears");
  wrap.classList.remove("shake"); void wrap.offsetWidth; wrap.classList.add("shake");
  tears.parentElement.classList.remove("crying"); void tears.offsetWidth;
  document.getElementById("mascot").classList.add("crying");
  setTimeout(() => {
    wrap.classList.remove("shake");
    document.getElementById("mascot").classList.remove("crying");
  }, 1100);
}

/* ---------- celebration effect on level-up ---------- */
function triggerCelebrate() {
  const wrap = document.getElementById("mascot-wrap");
  wrap.classList.remove("bounce"); void wrap.offsetWidth; wrap.classList.add("bounce");
  setTimeout(() => wrap.classList.remove("bounce"), 700);

  const layer = document.getElementById("confetti-layer");
  const colors = ["#F98CA8", "#F3C05B", "#4FBE95", "#A98DE0", "#8FD3F4"];
  for (let i = 0; i < 22; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.left = (40 + Math.random() * 80) + "px";
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (0.8 + Math.random() * 0.6) + "s";
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    layer.appendChild(piece);
    setTimeout(() => piece.remove(), 1600);
  }
}

/* ---------- growth: unlock accessories by level ---------- */
function setLevel(level) {
  document.getElementById("level-badge").textContent = "Lv." + level;
  document.getElementById("acc-bow").style.display = level >= 2 ? "block" : "none";
  document.getElementById("acc-crown").style.display = level >= 3 ? "block" : "none";
  const scale = Math.min(1.25, 1 + (level - 1) * 0.08);
  document.getElementById("mascot-wrap").style.transform = `scale(${scale})`;
}

/* ---------- quest forms ---------- */
const forms = {
  job: {
    badge: "job", icon: "\ud83d\udc3e", title: "Log a job / interview",
    fields: [
      { key: "title", label: "Job title", type: "input", placeholder: "e.g. Backend SWE Intern" },
      { key: "jd", label: "Job description (paste the key parts)", type: "textarea" }
    ],
    build: (v) => `I've got a new boss fight: the role is "${v.title}", here's the job description: ${v.jd}. Give me the boss intel.`
  },
  gold: {
    badge: "gold", icon: "\ud83c\udf30", title: "Log income / expense",
    fields: [
      { key: "amount", label: "Amount (positive = income, negative = expense, e.g. -45)", type: "input", placeholder: "-45" },
      { key: "note", label: "Note", type: "input", placeholder: "e.g. rent / part-time paycheck" }
    ],
    build: (v) => `Log an entry: amount ${v.amount}, note: ${v.note}. Update my gold and check whether HP needs a warning.`
  },
  time: {
    badge: "time", icon: "\ud83c\udf19", title: "Add a deadline",
    fields: [
      { key: "label", label: "Event name", type: "input", placeholder: "e.g. OPT documents due" },
      { key: "date", label: "Date", type: "input", placeholder: "2026-08-01" }
    ],
    build: (v) => `New deadline: "${v.label}", date is ${v.date}. Check whether it conflicts with anything already on the schedule.`
  }
};

function openForm(kind) {
  const cfg = forms[kind];
  const box = document.getElementById("mini-form");
  box.style.display = "block";
  box.innerHTML = `
    <div class="cute" style="font-size:14px;color:var(--pink-d);margin-bottom:6px">${cfg.icon} ${cfg.title}</div>
    ${cfg.fields.map(f => `
      <label>${f.label}</label>
      ${f.type === "textarea"
        ? `<textarea id="f_${f.key}" placeholder="${f.placeholder || ''}"></textarea>`
        : `<input id="f_${f.key}" placeholder="${f.placeholder || ''}">`}
    `).join("")}
    <div class="form-actions">
      <button class="submit" onclick="submitForm('${kind}')">Go \ud83d\udc3e</button>
      <button class="cancel" onclick="closeForm()">Cancel</button>
    </div>
  `;
}
function closeForm() { document.getElementById("mini-form").style.display = "none"; }
function submitForm(kind) {
  const cfg = forms[kind];
  const values = {};
  cfg.fields.forEach(f => { values[f.key] = document.getElementById(`f_${f.key}`).value; });
  const message = cfg.build(values);
  closeForm();
  sendToAgent(message, cfg.badge, cfg.icon);
}
function checkBoard() {
  sendToAgent("Check today's quest board: summarize any pending deadlines and low-gold warnings.", "you", "\ud83c\udf43");
}

/* ---------- quest log rendering ---------- */
function appendLog(badgeClass, icon, text) {
  const ears = document.getElementById("ears");
  if (ears) {
    ears.classList.remove("bounce");
    void ears.offsetWidth;
    ears.classList.add("bounce");
  }
  const log = document.getElementById("log");
  const empty = log.querySelector(".log-empty");
  if (empty) empty.remove();
  const entry = document.createElement("div");
  entry.className = "log-entry";
  entry.innerHTML = `<div class="badge ${badgeClass}">${icon}</div><div class="log-bubble">${text}</div>`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}
function appendLoading() {
  const log = document.getElementById("log");
  const div = document.createElement("div");
  div.className = "loading"; div.id = "loading-line";
  div.textContent = "The capybara is thinking...";
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}
function removeLoading() {
  const el = document.getElementById("loading-line");
  if (el) el.remove();
}

/* ---------- backend calls ---------- */
async function ensureSession() {
  try {
    await fetch(`${API_BASE}/apps/${APP_NAME}/users/${USER_ID}/sessions/${SESSION_ID}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ state: {} })
    });
  } catch (e) {}
}

async function sendToAgent(text, badgeClass, icon) {
  appendLog("you", "\ud83d\ude4b", text);
  appendLoading();
  try {
    const res = await fetch(`${API_BASE}/run`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        appName: APP_NAME, userId: USER_ID, sessionId: SESSION_ID,
        newMessage: { role: "user", parts: [{ text }] }
      })
    });
    const events = await res.json();
    removeLoading();
    const finalText = (events || [])
      .filter(e => e.content && e.content.parts)
      .flatMap(e => e.content.parts)
      .filter(p => p.text)
      .map(p => p.text)
      .join("\n");
    appendLog(badgeClass, icon, finalText || "(the agent returned no text — check the backend logs)");
    refreshStats();
  } catch (err) {
    removeLoading();
    appendLog("you", "⚠️", `Oh no... I tried my best, but my little capybara paws couldn't reach the server. Let's make sure the backend is running properly!<br><br><details style="font-size:11px;opacity:0.8;margin-top:6px;cursor:pointer;"><summary>Click for technical detail</summary><pre style="white-space:pre-wrap;margin:4px 0 0 0;">URL: ${API_BASE}/run\nError: ${err.message || err}</pre></details>`);
    console.error(err);
  }
}

async function refreshStats() {
  try {
    const res = await fetch(`${API_BASE}/apps/${APP_NAME}/users/${USER_ID}/sessions/${SESSION_ID}`);
    const session = await res.json();
    const state = session.state || {};
    const hp = state.hp ?? 70, gold = state.gold ?? 0, xp = state.xp ?? 0;

    document.getElementById("hp-fill").style.width = Math.max(0, Math.min(100, hp)) + "%";
    document.getElementById("hp-num").textContent = `${hp}/100`;
    document.getElementById("gold-fill").style.width = Math.max(0, Math.min(100, gold)) + "%";
    document.getElementById("gold-num").textContent = `$${gold}`;
    document.getElementById("xp-fill").style.width = Math.max(0, Math.min(100, xp % 100)) + "%";
    document.getElementById("xp-num").textContent = `${xp} xp`;

    setMood(hp >= 60 ? "happy" : hp >= 30 ? "sleepy" : "worried");

    const level = Math.floor(xp / 100) + 1;
    setLevel(level);

    // Compare against the previous reading to decide whether to fire an effect.
    // Nothing fires on the very first load since there's no "previous" value yet.
    if (prevHp !== null && hp < prevHp) triggerSad();
    if (prevLevel !== null && level > prevLevel) triggerCelebrate();
    prevHp = hp;
    prevLevel = level;
  } catch (e) {}
}

ensureSession().then(refreshStats);
</script>
</body>
</html>
